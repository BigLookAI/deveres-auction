[options]
addons_path = /mnt/extra-addons,/usr/lib/python3/dist-packages/odoo/addons
data_dir = /var/lib/odoo
db_host = db
db_port = 5432
db_user = odoo
db_password = ${POSTGRES_PASSWORD}
; single client DB — never expose the DB selector on a production host
dbfilter = ^odoo_deveres$
list_db = False
; set a strong value in .env.prod and render this file at deploy time
admin_passwd = ${ODOO_ADMIN_PASSWD}
proxy_mode = True
workers = 2
log_level = info
