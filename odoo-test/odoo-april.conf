[options]
; April REVIEW instance — serves ONLY the realistic April database to the
; client reviewer over its own public HTTPS port. Runs beside the demo
; instance, same postgres + addons, separate web endpoint so the demo web UI
; stays pinned to deveres_demo.
addons_path = /mnt/extra-addons,/usr/lib/python3/dist-packages/odoo/addons
data_dir = /var/lib/odoo
db_host = db
db_port = 5432
db_user = odoo
db_password = odoo_test_2026
; ONLY the April database — never the demo, never anything else
dbfilter = ^deveres_april$
; public exposure hardening: no database manager/selector; master password
; MUST be overridden with a strong value on any publicly reachable host
list_db = False
admin_passwd = CHANGE-ME-BEFORE-EXPOSING
; behind Tailscale Funnel TLS proxy (Odoo config forbids inline comments)
proxy_mode = True
workers = 0
log_level = info
