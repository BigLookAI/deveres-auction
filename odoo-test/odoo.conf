[options]
; Local April-test sandbox — mirrors the deveres.yaml assembly addons layout.
addons_path = /mnt/extra-addons,/usr/lib/python3/dist-packages/odoo/addons
data_dir = /var/lib/odoo
db_host = db
db_port = 5432
db_user = odoo
db_password = odoo_test_2026
; prefix match: 'deveres' (local April sandbox) and 'deveres_demo' (public demo)
