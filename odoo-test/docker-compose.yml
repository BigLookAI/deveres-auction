# deVeres — local Odoo 19 sandbox restored from the April-auction test backup.
# Matches the production stack shape (deveres.yaml assembly): Odoo 19 +
# PostgreSQL 15 + sor_* addons mounted at /mnt/extra-addons. Fully disposable,
# completely separate from the DGX production instance.
#
#   ./restore.sh ~/Downloads/odoo_deveres_april_test_2026-07-02_17-36-58.zip
#   → http://localhost:8071  (db: deveres, login: admin / DeveresTest2026!)
#
# Tear down (data gone, deliberately): docker compose down -v
services:
  db:
    image: postgres:15-alpine
    container_name: deveres-odoo-test-db
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo_test_2026
    volumes: [deveres-odoo-test-db:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo"]
      interval: 2s
      timeout: 3s
      retries: 30
  odoo:
    image: odoo:19
    container_name: deveres-odoo-test
    depends_on:
      db:
        condition: service_healthy
    ports: ["8071:8069"]
    environment:
      HOST: db
      USER: odoo
      PASSWORD: odoo_test_2026
    volumes:
      - deveres-odoo-test-data:/var/lib/odoo
      - ./addons:/mnt/extra-addons:ro
      - ./odoo.conf:/etc/odoo/odoo.conf:ro
  # April REVIEW web endpoint — opt-in (docker compose --profile april up -d).
  # Same postgres + addons + data volume (filestore subdirs are per-db); its
  # own conf pins the web UI to deveres_april only. Runs on :8073, published
  # via Tailscale Funnel https=8444 on the deveres node.
  odoo-april:
    image: odoo:19
    container_name: deveres-odoo-april
    profiles: ["april"]
    depends_on:
      db:
        condition: service_healthy
    ports: ["8073:8069"]
    environment:
      HOST: db
      USER: odoo
      PASSWORD: odoo_test_2026
    volumes:
      - deveres-odoo-test-data:/var/lib/odoo
      - ./addons:/mnt/extra-addons:ro
      - ./odoo-april.conf:/etc/odoo/odoo.conf:ro
volumes:
  deveres-odoo-test-db:
  deveres-odoo-test-data:
